[tool.ruff]
target-version = "py310"
line-length = 100
exclude = ["experiments"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"explore/*.py" = ["E402"]  # scripts modify sys.path before project imports
"run/*.py" = ["E402"]  # end-to-end runner scripts: sys.path before project imports
"alpha/*.py" = ["E402"]  # alpha module: sys.path before project imports
"*/__main__.py" = ["E402"] # allow standalone entry points

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.basedpyright]
pythonVersion = "3.10"
typeCheckingMode = "standard"
reportMissingTypeStubs = "warning"
reportUnknownMemberType = "warning"
reportUnknownVariableType = "warning"
reportUnknownArgumentType = "warning"
reportMissingParameterType = "warning"

reportUnusedVariable = "warning"
include = ["data", "signals", "tests", "strategies", "backtest", "explore"]
exclude = ["experiments", "run"]
